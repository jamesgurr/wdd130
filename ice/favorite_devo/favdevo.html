<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <table>
          <tr>
            <th>Speaker</th>
            <th>Title</th>
            <th>Location</th>
            <th>Year</th>
          </tr>
          <tr>
            <td>
              <a href="https://www.churchofjesuschrist.org/learn/robert-c-gay" target="_blank">Elder Robert C. Gay</a>
            </td>
            <td>
              <a href="https://www.byui.edu/speeches/devotionals/robert-c-gay/be-true-to-the-voice-of-god-may-5-2026" target="_blank">Be True to the Voice of God</a>
            </td>
            <td>BYU-I</td>
            <td>May 5, 2026</td>
          </tr>
          <tr>
            <td>
              <a href="https://www.churchofjesuschrist.org/learn/neil-l-andersen" target="_blank">Elder Neil L. Andersen</a>
            </td>
            <td>
              <a href="https://www.byui.edu/speeches/devotionals/neil-l-andersen/president-dallin-h-oaks-and-the-law-of-witnesses-february-22-2026" target="_blank">President Dallin H. Oaks and the Law of Witnesses</a>
            </td>
            <td>BYU-I</td>
            <td>February 22, 2026</td>
          </tr>
          <tr>
            <td>
              <a href="https://www.churchofjesuschrist.org/learn/dallin-h-oaks" target="_blank">President Dallin H. Oaks</a>
            </td>
            <td>
              <a href="https://www.byui.edu/speeches/devotionals/dallin-h-oaks/coming-closer-to-jesus-christ-february-10-2026" target="_blank">Coming Closer to Jesus Christ</a>
            </td>
            <td>BYU-I</td>
            <td>February 10, 2026</td>
          </tr>
        </table>
        <form action="#" method="post">
          <label for="speaker"></label>
          <input type="text" id="speaker" name="speaker" placeholder="Speaker Name" />
          <label for="title"></label>
          <input type="text" id="title" name="title" placeholder="Devotional Title" />
          <label for="location"></label>
          <input type="text" id="location" name="location" placeholder="Location" />
          <label for="year"></label>
          <input type="text" id="year" name="year" placeholder="Year" />
          <button type="submit">Add Devotional</button>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
